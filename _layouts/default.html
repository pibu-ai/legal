<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --paper: #ffffff;
      --ink: #242c30;
      --muted: #6f7a7f;
      --line: #e2e5df;
      --green: #175439;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(760px, calc(100% - 40px));
      margin: 48px auto;
      padding: 40px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(36, 44, 48, 0.08);
    }

    h1, h2 {
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 6vw, 3.25rem);
    }

    h2 {
      margin-top: 2.1rem;
      font-size: 1.35rem;
    }

    p, li {
      color: var(--muted);
      font-size: 1rem;
    }

    a {
      color: var(--green);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 28px, 760px);
        margin: 24px auto;
        padding: 24px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
